<!DOCTYPE html>
<html>
<head>
    <title>AI Insurance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>

<div class="container">
    <div class="card">

        <!-- Toggle Buttons -->
        <div class="toggle">
            <button onclick="showForm('claim')">💰 Claim</button>
            <button onclick="showForm('fraud')">🚨 Fraud</button>
        </div>

        <form action="/predict" method="post">

            <input type="hidden" name="task" id="task" value="claim">

            <!-- CLAIM FORM -->
            <div id="claim-form">
                <input type="number" name="age" placeholder="Age"><br>
                <input type="number" name="bmi" placeholder="BMI"><br>
                <input type="number" name="children" placeholder="Children"><br>

                <select name="sex">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>

                <select name="smoker">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>

                <select name="region">
                    <option value="northwest">Northwest</option>
                    <option value="southeast">Southeast</option>
                </select>
            </div>

            <!-- FRAUD FORM -->
            <div id="fraud-form" style="display:none;">
                <input type="number" name="Billed Amount" placeholder="Billed Amount"><br>
                <input type="number" name="Paid Amount" placeholder="Paid Amount"><br>

                <select name="Insurance Type">
                    <option value="Private">Private</option>
                    <option value="Government">Government</option>
                </select>

                <select name="Claim Status">
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>

            <button type="submit">🚀 Predict</button>

        </form>

    </div>
</div>

</body>
</html>
